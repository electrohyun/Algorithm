<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>BFS 시각화</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 24px;
        background: #f7f7f7;
      }

      svg {
        background: white;
        border: 1px solid #ddd;
        border-radius: 12px;
      }

      .node {
        fill: #ddd;
        stroke: #333;
        stroke-width: 2;
      }

      .visited {
        fill: #7dd3fc;
      }

      .current {
        fill: #facc15;
      }

      text {
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      button {
        margin-top: 16px;
        padding: 10px 16px;
        font-size: 16px;
      }

      .box {
        margin-top: 16px;
        padding: 12px;
        background: white;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h2>BFS 시각화: 0번에서 시작</h2>

    <svg width="400" height="260">
      <!-- 선 -->
      <line x1="100" y1="130" x2="200" y2="80" stroke="#333" />
      <line x1="100" y1="130" x2="200" y2="180" stroke="#333" />
      <line x1="200" y1="80" x2="300" y2="80" stroke="#333" />

      <!-- 노드 -->
      <circle id="node0" class="node" cx="100" cy="130" r="28" />
      <circle id="node1" class="node" cx="200" cy="80" r="28" />
      <circle id="node2" class="node" cx="200" cy="180" r="28" />
      <circle id="node3" class="node" cx="300" cy="80" r="28" />

      <text x="100" y="130">0</text>
      <text x="200" y="80">1</text>
      <text x="200" y="180">2</text>
      <text x="300" y="80">3</text>
    </svg>

    <br />

    <button onclick="nextStep()">다음 단계</button>
    <button onclick="reset()">처음부터</button>

    <div class="box">
      <p><b>현재 처리 중:</b> <span id="current">없음</span></p>
      <p><b>queue:</b> <span id="queue">[]</span></p>
      <p><b>dist:</b> <span id="dist">[-1, -1, -1, -1]</span></p>
      <p><b>설명:</b> <span id="desc">시작 전</span></p>
    </div>

    <script>
      const graph = [
        [1, 2], // 0번과 연결된 노드
        [0, 3], // 1번과 연결된 노드
        [0], // 2번과 연결된 노드
        [1], // 3번과 연결된 노드
      ];

      let queue;
      let head;
      let dist;

      function reset() {
        queue = [0];
        head = 0;
        dist = [-1, -1, -1, -1];
        dist[0] = 0;

        updateUI(null, "0번을 queue에 넣고 시작합니다.");
      }

      function nextStep() {
        if (head >= queue.length) {
          updateUI(null, "BFS 끝. 더 이상 처리할 노드가 없습니다.");
          return;
        }

        const current = queue[head];
        head++;

        for (const next of graph[current]) {
          if (dist[next] !== -1) continue;

          dist[next] = dist[current] + 1;
          queue.push(next);
        }

        updateUI(
          current,
          `${current}번을 꺼내서, 연결된 노드들을 확인했습니다.`,
        );
      }

      function updateUI(current, desc) {
        for (let i = 0; i < 4; i++) {
          const node = document.getElementById(`node${i}`);
          node.setAttribute("class", "node");

          if (dist[i] !== -1) {
            node.setAttribute("class", "node visited");
          }

          if (i === current) {
            node.setAttribute("class", "node current");
          }
        }

        document.getElementById("current").textContent =
          current === null ? "없음" : current;

        document.getElementById("queue").textContent = JSON.stringify(
          queue.slice(head),
        );

        document.getElementById("dist").textContent = JSON.stringify(dist);

        document.getElementById("desc").textContent = desc;
      }

      reset();
    </script>
  </body>
</html>
